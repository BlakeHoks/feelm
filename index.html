<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0f" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f7f8fa" media="(prefers-color-scheme: light)" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
    />

    <title>Feelm — Movies by mood</title>

    <script>
      // FOUC-safe theme init. Runs before React mounts.
            // Читает формат zustand persist: { state: { mode: 'dark'|'light'|'system' } }.
            // Default: dark.
            ;(() => {
              let mode = 'dark'
              try {
                const raw = localStorage.getItem('feelm-theme')
                if (raw) {
                  const parsed = JSON.parse(raw)
                  const stored = parsed?.state?.mode
                  if (stored === 'light' || stored === 'dark' || stored === 'system') mode = stored
                }
                const resolved =
                  mode === 'system'
                    ? window.matchMedia('(prefers-color-scheme: light)').matches
                      ? 'light'
                      : 'dark'
                    : mode
                document.documentElement.setAttribute('data-theme', resolved)
              } catch {
                document.documentElement.setAttribute('data-theme', 'dark')
              }
            })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
